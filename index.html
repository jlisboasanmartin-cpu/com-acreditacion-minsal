<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Capacitación — Centro Odontológico de Macul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a6b8a;
      --primary-dark: #0e4a61;
      --accent: #2ecc71;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Quicksand', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: linear-gradient(160deg, #0a3548 0%, #0e4a61 45%, #1a6b8a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 56px 52px 52px;
      max-width: 580px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      position: relative;
    }

    /* mascota */
    .mascot-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      position: absolute;
      right: 40px;
      bottom: 100%;
      pointer-events: none;
    }
    .mascot-wrap img {
      height: 180px;
      width: auto;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.35));
      transform: scaleX(-1); /* apunta hacia adentro de la tarjeta */
    }

    /* badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      margin-bottom: 24px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 700;
      color: white;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    h1 span { color: #8af0c0; }

    p {
      font-size: 16px;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
      max-width: 420px;
      margin: 0 auto 36px;
    }

    /* botón principal */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #0a3548;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 6px 24px rgba(46,204,113,0.4);
    }
    .btn-primary:hover {
      background: #27ae60;
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(46,204,113,0.5);
    }
    .btn-primary:active { transform: translateY(0); }

    .arrow {
      font-size: 20px;
      line-height: 1;
    }

    /* url visible */
    .url-hint {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.02em;
    }

    /* decoración de fondo */
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      pointer-events: none;
    }
    .bg-circle-1 { width: 500px; height: 500px; top: -180px; right: -160px; }
    .bg-circle-2 { width: 340px; height: 340px; bottom: -120px; left: -100px; }
  </style>
</head>
<body>

  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="card">

    <div class="mascot-wrap">
      <img src="assets/images/poses-clean/dr-com-explicando.png" alt="Dr. COM" />
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Plataforma actualizada
    </div>

    <h1>¡Nos <span>mudamos</span>!<br>El programa sigue aquí</h1>

    <p>
      Esta versión del portal ya no está activa.<br>
      El programa de capacitación continúa en una nueva plataforma mejorada. Haga clic para acceder.
    </p>

    <a href="https://com-acreditacion-minsal.vercel.app/" class="btn-primary">
      Ir al nuevo portal
      <span class="arrow">→</span>
    </a>

    <p class="url-hint">com-acreditacion-minsal.vercel.app</p>

  </div>

</body>
</html>
